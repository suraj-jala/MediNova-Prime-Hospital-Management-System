<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Patient Consultation</title>

    <link rel="stylesheet" href="css/consultation.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>MediNova Prime</h2>

        <ul>

            <li>🏠 Dashboard</li>

            <li class="active">🩺 Consultation</li>

            <li>💊 Prescriptions</li>

            <li>🧪 Lab Tests</li>

            <li>📋 Reports</li>

            <li>🚪 Logout</li>

        </ul>

    </div>

    <!-- Main -->

    <div class="main">

        <div class="header">

            <h1>Patient Consultation</h1>

            <span>Dr. Rahul</span>

        </div>

        <!-- Patient Details -->

        <div class="card">

            <h2>Patient Information</h2>

            <div class="grid">

                <div>

                    <label>Patient ID</label>

                    <input
                        type="text"
                        id="patientId"
                        readonly>

                </div>

                <div>

                    <label>Patient Name</label>

                    <input
                        type="text"
                        id="patientName"
                        readonly>

                </div>

                <div>

                    <label>Age</label>

                    <input
                        type="text"
                        id="age"
                        readonly>

                </div>

                <div>

                    <label>Gender</label>

                    <input
                        type="text"
                        id="gender"
                        readonly>

                </div>

            </div>

            <br>

            <label>Problem / Symptoms</label>

            <textarea
                id="problem"
                readonly></textarea>

        </div>

        <!-- Doctor Consultation -->

        <div class="card">

            <h2>Doctor Consultation</h2>

            <label>Diagnosis</label>

            <textarea
                id="diagnosis"
                placeholder="Enter Diagnosis"></textarea>

            <label>Prescription</label>

            <textarea
                id="medicine"
                placeholder="Enter Medicines"></textarea>

            <label>Doctor Notes</label>

            <textarea
                id="notes"
                placeholder="Additional Notes"></textarea>

            <button onclick="completeConsultation()">

                Complete Consultation

            </button>

        </div>

    </div>

</div>

<script src="js/consultation.js"></script>

</body>

</html>ne
