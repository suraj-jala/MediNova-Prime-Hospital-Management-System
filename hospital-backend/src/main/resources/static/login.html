<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MediNova Prime</title>

    <link rel="stylesheet" href="css/login.css">

</head>

<body>

    <div class="overlay">

        <div class="login-card">

            <div class="logo">
                🏥
            </div>

            <h1>
                MediNova <span>Prime</span>
            </h1>

            <p class="subtitle">
                Smart Hospital Management System
            </p>

            <div class="line"></div>

            <form id="loginForm">

                <div class="input-group">
                    <input
                        type="text"
                        id="username"
                        placeholder="Username"
                        required>
                </div>

                <div class="input-group">
                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required>
                </div>

                <div class="forgot">
                    <a href="#">
                        Forgot Password?
                    </a>
                </div>

                <button type="submit">
                    Sign In →
                </button>

            </form>

            <div class="footer">
                © 2026 MediNova Prime. All Rights Reserved.
            </div>

        </div>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
